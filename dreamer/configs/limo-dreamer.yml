# DreamerV3 configuration for LimoCustomEnv — FINAL version
# Hyperparameters: entropyScale=0.0001, reconstruction std=0.3
# Curriculum stages: 0→1 at 19200 gs, 1→2 at 43200 gs (32% / 72% of 60k)
environmentName: LimoCustomEnv
runName: final
seed: 42

gradientSteps: 60000
replayRatio: 100
saveMetrics: True
saveCheckpoints: True
checkpointInterval: 5000
resume: False
checkpointToLoad: 45k

episodesBeforeStart: 10
numInteractionEpisodes: 1
numEvaluationEpisodes: 5

dreamer:
    batchSize: 32
    batchLength: 32
    imaginationHorizon: 10

    recurrentSize: 256
    latentLength: 16
    latentClasses: 16
    encodedObsSize: 128

    useContinuationPrediction: True
    actorLR: 0.00004
    criticLR: 0.0001
    worldModelLR: 0.0002
    gradientNormType: 2
    gradientClip: 100

    discount: 0.99
    lambda_: 0.95
    freeNats: 1
    betaPrior: 1.0
    betaPosterior: 0.1
    entropyScale: 0.0001

    buffer:
        capacity: 100000

    encoder:
        hiddenSize: 256
        numLayers: 2
        activation: ELU

    decoder:
        hiddenSize: 256
        numLayers: 2
        activation: ELU

    recurrentModel:
        hiddenSize: 200
        activation: Tanh

    priorNet:
        hiddenSize: 200
        numLayers: 2
        activation: Tanh
        uniformMix: 0.01

    posteriorNet:
        hiddenSize: 200
        numLayers: 2
        activation: Tanh
        uniformMix: 0.01

    reward:
        hiddenSize: 256
        numLayers: 2
        activation: ELU

    continuation:
        hiddenSize: 256
        numLayers: 2
        activation: ELU

    actor:
        hiddenSize: 256
        numLayers: 2
        activation: ELU

    critic:
        hiddenSize: 256
        numLayers: 2
        activation: ELU

folderNames:
    metricsFolder: results/metrics
    plotsFolder: results/figures
    checkpointsFolder: results/checkpoints_dreamer
